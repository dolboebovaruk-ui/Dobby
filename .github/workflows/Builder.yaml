name: Android Builder (armeabi-v7a & arm64-v8a)

on:
  push:
    branches:
      - master

env:
  CMAKE_VERSION: 3.25.2
  LLVM_VERSION: 15.0.6
  NDK_VERSION: r25b

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v3

      - name: Setup Android cross compile environment
        run: |
          sh scripts/setup_linux_cross_compile.sh
          mkdir -p artifact
        shell: bash

      - name: Build Android armeabi-v7a (32-bit)
        run: |
          python3 scripts/platform_builder.py \
            --platform=android \
            --arch=armeabi-v7a \
            --cmake_dir=$HOME/opt/cmake-$CMAKE_VERSION \
            --llvm_dir=$HOME/opt/llvm-$LLVM_VERSION \
            --android_ndk_dir=$HOME/opt/ndk-$NDK_VERSION
          cp include/dobby.h build/android
          tar -zcvf build/dobby-android-armeabi-v7a.tar.gz build/android
          cp build/dobby-android-armeabi-v7a.tar.gz artifact/
        shell: bash

      - name: Build Android arm64-v8a (64-bit)
        run: |
          python3 scripts/platform_builder.py \
            --platform=android \
            --arch=arm64-v8a \
            --cmake_dir=$HOME/opt/cmake-$CMAKE_VERSION \
            --llvm_dir=$HOME/opt/llvm-$LLVM_VERSION \
            --android_ndk_dir=$HOME/opt/ndk-$NDK_VERSION
          cp include/dobby.h build/android
          tar -zcvf build/dobby-android-arm64-v8a.tar.gz build/android
          cp build/dobby-android-arm64-v8a.tar.gz artifact/
        shell: bash

      - name: List artifacts
        run: ls -lha artifact/

      - name: Create/Update release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
          body: "Dobby Android builds: armeabi-v7a (32-bit) and arm64-v8a (64-bit)"
          artifacts: |
            artifact/dobby-android-armeabi-v7a.tar.gz
            artifact/dobby-android-arm64-v8a.tar.gz
          allowUpdates: true
          replacesArtifacts: true
